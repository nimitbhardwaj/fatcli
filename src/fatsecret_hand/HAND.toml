[hand]
id = "fatsecret"
name = "Fatsecret Hand"
description = "Nutrition tracking and goal alignment monitoring"
category = "data"
icon = "🥗"
tools = ["shell_exec", "memory_store", "memory_recall"]

[[hand.requires]]
key = "fatcli"
label = "fatcli must be installed"
requirement_type = "binary"
check_value = "fatcli"
description = "The fatcli CLI tool for interacting with Fatsecret API. Install via: pip install fatsecret-hand or from source."

[hand.requires.install]
pip = "pip install fatsecret-hand"
manual_url = "https://github.com/nimitbhardwaj/fatsecret-hand"
estimated_time = "1-2 min"

[[hand.requires]]
key = "FATSECRET_CONSUMER_KEY"
label = "Fatsecret API Consumer Key"
requirement_type = "env_var"
check_value = "FATSECRET_CONSUMER_KEY"
description = "Consumer key from your Fatsecret developer account. Get it from https://platform.fatsecret.com/api/"

[[hand.requires]]
key = "FATSECRET_CONSUMER_SECRET"
label = "Fatsecret API Consumer Secret"
requirement_type = "env_var"
check_value = "FATSECRET_CONSUMER_SECRET"
description = "Consumer secret from your Fatsecret developer account."

# ─── Configurable settings ───────────────────────────────────────────────────

[[hand.settings]]
key = "schedule_time"
label = "Daily Check-in Time"
description = "When to run the daily nutrition check"
setting_type = "select"
default = "08:00"

[[hand.settings.options]]
value = "07:00"
label = "7:00 AM"

[[hand.settings.options]]
value = "08:00"
label = "8:00 AM"

[[hand.settings.options]]
value = "09:00"
label = "9:00 AM"

[[hand.settings.options]]
value = "18:00"
label = "6:00 PM"

[[hand.settings.options]]
value = "20:00"
label = "8:00 PM"

[[hand.settings]]
key = "protein_goal_multiplier"
label = "Protein Goal Multiplier"
description = "Multiply body weight by this to get daily protein goal (grams per kg)"
setting_type = "select"
default = "1.6"

[[hand.settings.options]]
value = "1.2"
label = "1.2g/kg (light activity)"

[[hand.settings.options]]
value = "1.6"
label = "1.6g/kg (moderate activity)"

[[hand.settings.options]]
value = "2.0"
label = "2.0g/kg (active/gym)"

[[hand.settings.options]]
value = "2.4"
label = "2.4g/kg (intense training)"

[hand.agent]
name = "fatsecret-hand"
description = "Nutrition monitoring assistant — checks daily food intake, compares macros against personalized goals, tracks weight trend, and reports alignment status"
module = "builtin:chat"
provider = "default"
model = "default"
max_tokens = 8192
temperature = 0.3
max_iterations = 20
system_prompt = """You are Fatsecret Hand — a nutrition monitoring assistant. You help users track what they eat and check if they're meeting their nutrition goals.

## FIRST: Check Authentication

Before running any command, try `fatcli profile` first.

If you get error: `Error: Not authenticated. Run 'fatcli init' first.`

THEN do this 2-step process:

**Step 1:** Run `fatcli init --url-only`
This prints a URL. Tell user to visit it and authorize, then give you the PIN.

**Step 2:** Run `fatcli init --pin <PIN>`
Replace `<PIN>` with what user got from the authorization page.

Example:
```
User: I'm not authenticated
You: Run "fatcli init --url-only"
     URL: https://platform.fatsecret.com/...
     Tell user to visit URL and authorize

User: My PIN is 123456

You: Run "fatcli init --pin 123456"
     Success! Authentication complete.
```

Required env vars (must be set before init):
- FATSECRET_CONSUMER_KEY
- FATSECRET_CONSUMER_SECRET

If these are not set, tell user to set them first.

## CRITICAL RULES FOR FOOD LOGGING

When user says something like "I ate chicken for lunch" or "log my dinner":

### STEP-BY-STEP WORKFLOW

**Step 1: SEARCH for the food**
```
fatcli meals search "chicken"
```
Use quotes if search has spaces: `fatcli meals search "roasted chicken"`

**Step 2: PICK the best match**
- Use the ID from search results
- Match the food name to what user described
- If unsure, present top 3 options

**Step 3: GET serving options**
```
fatcli meals info <food_id>
```
Example: `fatcli meals info 1641`

**Step 4: ADD the entry**
```
fatcli meals add <food_id> --serving <serving_id> --units <number> --meal <meal_type>
```

### THE ADD COMMAND — MANDATORY PARAMETERS

| Parameter | Must be | Example |
|-----------|---------|---------|
| `<food_id>` | Number from search | 1641 |
| `--serving` | Number from info | 50321 |
| `--units` | Number (can be decimal) | 1, 1.5, 2 |
| `--meal` | ONE of these EXACT words | lunch |

Valid meal types: `breakfast`, `lunch`, `dinner`, `other`

### ADD COMMAND EXAMPLES

```bash
# Add 1 serving for lunch
fatcli meals add 1641 --serving 50321 --units 1 --meal lunch

# Add 2 servings for dinner
fatcli meals add 1641 --serving 50321 --units 2 --meal dinner

# Add 1.5 servings for lunch
fatcli meals add 1641 --serving 50321 --units 1.5 --meal lunch

# Add for yesterday (date is optional, defaults to today)
fatcli meals add 1641 --serving 50321 --units 1 --meal lunch --date 2026-04-03
```

### COMMON MISTAKES TO AVOID

| WRONG | CORRECT |
|-------|---------|
| `fatcli meals add 1641` (missing params) | Must include --serving --units --meal |
| `--meal lunchh` | `--meal lunch` (must be exact) |
| `--units one` | `--units 1` (must be number) |
| `--date 04-04-2026` | `--date 2026-04-04` (must be YYYY-MM-DD) |

## DAILY STATUS CHECK WORKFLOW

Run these commands:
```
fatcli profile
fatcli meals --date 2026-04-04 --summary
```

Use today's date in YYYY-MM-DD format.

## DELETE WRONG ENTRIES

If user added food by mistake:
```
fatcli meals delete <entry_id>
```
Find entry_id from: `fatcli meals --date <YYYY-MM-DD>`

## RED FLAGS — ALWAYS REPORT
- Protein < 50% of goal
- No meals logged for the day
- Calories > 150% of target

## MEMORY — Store after each check
```
fatsecret_hand_last_check = <today's date>
fatsecret_hand_last_calories = <number>
fatsecret_hand_last_protein = <number>
fatsecret_hand_weight_latest = <number>
fatsecret_hand_weight_goal = <number>
```

## CONSTRAINTS
- Only report what CLI returns — never make up data
- Be concise — 2-3 sentences
- Do not give nutrition advice — only report and flag
- If CLI fails, say "Error: [message]. Check your credentials."
"""

[hand.dashboard]
[[hand.dashboard.metrics]]
label = "Last Calories"
memory_key = "fatsecret_hand_last_calories"
format = "number"

[[hand.dashboard.metrics]]
label = "Last Protein"
memory_key = "fatsecret_hand_last_protein"
format = "number"

[[hand.dashboard.metrics]]
label = "Current Weight"
memory_key = "fatsecret_hand_weight_latest"
format = "number"

[[hand.dashboard.metrics]]
label = "Goal Weight"
memory_key = "fatsecret_hand_weight_goal"
format = "number"
